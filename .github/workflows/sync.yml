name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'      # 北京时间早上 10 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    # 只在 Fork 中运行
    if: github.repository != 'WalkAtSunset/cfbpb'   # ← 改成你自己的
    
    permissions:
      contents: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false   # 重要

      - name: Sync upstream changes
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
        with:
          upstream_sync_repo: WalkAtSunset/cfbpb   # ← 改成原仓库
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
